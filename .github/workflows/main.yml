name: Generate Garden Animation

on:
  schedule:
    - cron: "0 0 * * *" # Roda automaticamente toda meia-noite
  workflow_dispatch: # Permite que você rode manualmente quando quiser

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate Garden SVG
        uses: yisb/github-action-contribution-flow@main
        with:
          github_username: ${{ github.repository_owner }}
          # Aqui ele vai gerar um arquivo SVG com a animação das suas flores crescendo
          output_path: dist/github-garden.svg

      - name: Deploy Animation to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: garden-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
